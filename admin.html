<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Fork in the Road</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@0,400;0,500;0,600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; }

    body {
      font-family: 'Open Sans', -apple-system, sans-serif;
      background: #fcf9f3;
      color: #1c1810;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: #1c1810;
      color: #fcf9f3;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    header a { color: #9a9080; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; }
    header a:hover { color: #fcf9f3; }

    .toolbar {
      padding: 1rem 1.5rem;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #f9f3e7;
    }
    .toolbar input {
      flex: 2;
      min-width: 320px;
      padding: 8px 12px;
      border: 1px solid #f9f3e7;
      background: white;
      font-family: inherit;
      font-size: 13px;
      color: #1c1810;
    }
    .toolbar input:focus { outline: 2px solid #006f84; outline-offset: 1px; }
    #rowCount { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #6b6560; white-space: nowrap; }

    .btn {
      padding: 8px 14px;
      border: 1px solid #c2baa8;
      background: white;
      color: #1c1810;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #eeece6; }
    .btn.primary { background: #006f84; color: white; border-color: #006f84; }
    .btn.primary:hover { background: #005a6b; }
    .btn.danger { background: white; color: #b04030; border-color: #e0b0a8; }
    .btn.danger:hover { background: #fdf0ee; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6560;
      background: #f9f3e7;
      border-bottom: 1px solid #f0e8d8;
      white-space: nowrap;
    }
    thead th.sortable { cursor: pointer; user-select: none; }
    thead th.sortable:hover { color: #1c1810; }
    tbody tr { border-bottom: 1px solid #f9f3e7; }
    tbody tr:hover { background: #fdfaf5; }
    tbody td { padding: 10px 12px; vertical-align: middle; }
    td.title { font-weight: 500; max-width: 200px; }
    td.cuisine { color: #6b6560; font-size: 13px; }
    td.note { color: #6b6560; font-size: 13px; font-style: italic; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.coords { color: #6b6560; font-size: 12px; font-family: monospace; white-space: nowrap; }
    .visited-badge {
      display: inline-block;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #006f84;
      color: white;
    }
    td.actions { white-space: nowrap; text-align: right; }
    tr.group-header td {
      padding: 12px 12px 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6560;
      background: #f9f3e7;
      border-top: 2px solid #f0e8d8;
    }
    td.actions .btn { padding: 5px 10px; font-size: 11px; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: white;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.75rem;
      position: relative;
    }
    .modal h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6560;
      margin-bottom: 1.25rem;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6b6560;
    }
    .form-group input, .form-group textarea {
      padding: 8px 36px 8px 10px;
      border: 1px solid #f9f3e7;
      background: #fcf9f3;
      font-family: inherit;
      font-size: 13px;
      color: #1c1810;
      width: 100%;
    }
    .form-group input:focus, .form-group textarea:focus { outline: 2px solid #006f84; outline-offset: 1px; border-color: #006f84; background: white; }
    .input-wrap { position: relative; display: flex; }
    .input-clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6b6560;
      line-height: 0;
      padding: 4px;
      display: none;
    }
    .input-clear-btn:hover { color: #1c1810; }
    .input-wrap textarea ~ .input-clear-btn { top: 12px; transform: none; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group.checkbox { flex-direction: row; align-items: center; gap: 8px; }
    .form-group.checkbox input { width: auto; accent-color: #006f84; }
    .form-group.checkbox label { text-transform: uppercase; letter-spacing: 0.07em; font-size: 11px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #6b6560; padding: 4px;
    }
    .modal-close:hover { color: #1c1810; }
  </style>
</head>
<body>

<header>
  <h1>Fork in the Road — Admin</h1>
  <a href="/">← Back to app</a>
</header>

<div id="data-notice" style="display:none;padding:8px 1.5rem;font-size:12px;color:#6b6560;background:#f9f3e7;border-bottom:1px solid #f0e8d8;"></div>
<div class="toolbar">
  <input type="text" id="search" placeholder="Filter by name, cuisine, note…" oninput="renderTable()">
  <span id="rowCount"></span>
  <span style="flex:1;"></span>
  <button class="btn primary" onclick="openAdd()">+ Add Place</button>
</div>

<div style="overflow-x:auto;">
  <table>
    <thead>
      <tr>
        <th class="sortable" onclick="sort('title')">Name</th>
        <th class="sortable" onclick="sort('city')">Location</th>
        <th class="sortable" onclick="sort('cuisine')">Cuisine</th>
        <th>Note</th>
        <th class="sortable" onclick="sort('lat')">Coords</th>
        <th class="sortable" onclick="sort('visited')">Visited</th>
        <th class="sortable" onclick="sort('type')">Food &amp; Drink</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Edit Place</h2>

    <!-- Lookup section (add mode only) -->
    <div id="lookup-section" style="display:none;margin-bottom:1.25rem;">
      <div class="form-group full" style="display:flex;flex-direction:column;gap:4px;">
        <label style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#6b6560;">Google Maps Link</label>
        <div style="position:relative;">
          <input id="f-lookup-url" type="text" placeholder="Paste a Google Maps link…"
            style="width:100%;padding:8px 32px 8px 10px;border:1px solid #f9f3e7;background:#fcf9f3;font-family:inherit;font-size:13px;color:#1c1810;"
            onpaste="onLookupPaste()" oninput="scheduleLookup(600)">
          <span id="lookup-spinner" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#006f84;">⏳</span>
        </div>
        <div id="lookup-status" style="font-size:12px;min-height:16px;color:#6b6560;"></div>
      </div>
      <hr style="border:none;border-top:1px solid #f0e8d8;margin:0.75rem 0 1rem;">
    </div>

    <div class="form-grid">
      <div class="form-group full"><label>Name</label><input id="f-title" type="text"></div>
      <div class="form-group"><label>City</label><input id="f-city" type="text"></div>
      <div class="form-group"><label>State</label><input id="f-state" type="text"></div>
      <div class="form-group"><label>Cuisine / Category</label><input id="f-cuisine" type="text"></div>
      <div class="form-group"><label>Type</label><select id="f-type">
        <option value="">— Select type —</option>
        <option>Restaurant</option><option>Bar</option><option>Café / Coffee</option>
        <option>Bakery</option><option>Ice Cream / Dessert</option><option>Brewery</option>
        <option>Winery</option><option>Park / Nature</option><option>Museum</option>
        <option>Shop</option><option>Market</option><option>Hotel</option>
        <option>Experience</option><option>Library</option>
      </select></div>
      <div class="form-group"><label>Tags</label><input id="f-tags" type="text"></div>
      <div class="form-group full"><label>Note</label><textarea id="f-note"></textarea></div>
      <div class="form-group full"><label>Maps URL</label><input id="f-url" type="text"></div>
      <div class="form-group"><label>Latitude</label><input id="f-lat" type="number" step="any" readonly tabindex="-1" style="opacity:0.5;cursor:default;pointer-events:none;"></div>
      <div class="form-group"><label>Longitude</label><input id="f-lng" type="number" step="any" readonly tabindex="-1" style="opacity:0.5;cursor:default;pointer-events:none;"></div>
      <input type="hidden" id="f-country">
      <div class="form-group checkbox full">
        <input id="f-visited" type="checkbox">
        <label for="f-visited">Visited</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="btn-get-missing" style="display:none;margin-right:auto;" onclick="getMissingInfo()">Get missing info</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<script>
  const STATE_ABBR = {"alabama":"AL","alaska":"AK","arizona":"AZ","arkansas":"AR","california":"CA","colorado":"CO","connecticut":"CT","delaware":"DE","florida":"FL","georgia":"GA","hawaii":"HI","idaho":"ID","illinois":"IL","indiana":"IN","iowa":"IA","kansas":"KS","kentucky":"KY","louisiana":"LA","maine":"ME","maryland":"MD","massachusetts":"MA","michigan":"MI","minnesota":"MN","mississippi":"MS","missouri":"MO","montana":"MT","nebraska":"NE","nevada":"NV","new hampshire":"NH","new jersey":"NJ","new mexico":"NM","new york":"NY","north carolina":"NC","north dakota":"ND","ohio":"OH","oklahoma":"OK","oregon":"OR","pennsylvania":"PA","rhode island":"RI","south carolina":"SC","south dakota":"SD","tennessee":"TN","texas":"TX","utah":"UT","vermont":"VT","virginia":"VA","washington":"WA","west virginia":"WV","wisconsin":"WI","wyoming":"WY","district of columbia":"DC"};
  function normalizeState(s) { return STATE_ABBR[s.toLowerCase().trim()] ?? s; }

  let restaurants = [];
  let sortKey = 'title';
  let sortDir = 1;
  let editingId = null; // null = add mode, number = edit mode

  const FOOD_DRINK_TYPES = new Set(['Restaurant','Bar','Café / Coffee','Bakery','Ice Cream / Dessert','Brewery','Winery']);
  function isFoodDrink(type) { return FOOD_DRINK_TYPES.has(type); }

async function load() {
    restaurants = await fetch('/api/restaurants').then(r => r.json());
    const missingCity = restaurants.filter(r => !r.city).length;
    const notice = document.getElementById('data-notice');
    if (missingCity > 0) {
      notice.textContent = `${missingCity} place${missingCity === 1 ? ' is' : 's are'} missing city data.`;
      notice.style.display = '';
    } else {
      notice.style.display = 'none';
    }
    renderTable();
  }

  function sort(key) {
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = 1; }
    renderTable();
  }

  function rowHtml(r) {
    return `<tr>
      <td class="title">${esc(r.title)}</td>
      <td class="cuisine">${[r.city, r.state ? normalizeState(r.state) : ''].filter(Boolean).map(esc).join(', ') || '—'}</td>
      <td class="cuisine">${esc(r.cuisine)}</td>
      <td class="note" title="${esc(r.note)}">${esc(r.note)}</td>
      <td class="coords">${r.lat != null ? `<a href="https://www.google.com/maps?q=${r.lat},${r.lng}" target="_blank" rel="noopener" style="color:#006f84;text-decoration:none;">${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}</a>` : '—'}</td>
      <td>${r.visited ? '<span class="visited-badge">Visited</span>' : ''}</td>
      <td style="text-align:center;">${isFoodDrink(r.type) ? 'Yes' : 'No'}</td>
      <td class="actions">
        <button class="btn" onclick="openEdit(${r.id})">Edit</button>
        <button class="btn danger" onclick="del(${r.id})">Delete</button>
      </td>
    </tr>`;
  }

  function groupHeaderHtml(label, count) {
    return `<tr class="group-header">
      <td colspan="8">${esc(label)} <span style="font-weight:400;opacity:0.6;">(${count})</span></td>
    </tr>`;
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    let rows = restaurants.filter(r =>
      !q || [r.title, r.cuisine, r.note, r.tags, r.city, r.state, r.country].some(f => (f||'').toLowerCase().includes(q))
    );
    rows.sort((a, b) => {
      const av = sortKey === 'type' ? (isFoodDrink(a.type) ? 0 : 1) : (a[sortKey] ?? '');
      const bv = sortKey === 'type' ? (isFoodDrink(b.type) ? 0 : 1) : (b[sortKey] ?? '');
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
    document.getElementById('rowCount').textContent = `${rows.length} places`;

    let html = '';
    if (sortKey === 'city') {
      // Group by country when sorted by Location
      const groups = new Map();
      for (const r of rows) {
        const key = r.country || '—';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      }
      // Sort groups: United States first, then alphabetically, unknown last
      const sorted = [...groups.entries()].sort(([a], [b]) => {
        if (a === 'United States') return -1;
        if (b === 'United States') return 1;
        if (a === '—') return 1;
        if (b === '—') return -1;
        return a.localeCompare(b);
      });
      for (const [country, items] of sorted) {
        html += groupHeaderHtml(country, items.length);
        html += items.map(rowHtml).join('');
      }
    } else {
      html = rows.map(rowHtml).join('');
    }

    document.getElementById('tbody').innerHTML = html;
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let lookupTimer = null;

  function scheduleLookup(delay) {
    clearTimeout(lookupTimer);
    lookupTimer = setTimeout(lookup, delay);
  }

  function onLookupPaste() {
    // Extract name instantly from URL without waiting for server
    setTimeout(() => {
      const url = document.getElementById('f-lookup-url').value.trim();
      // Try /maps/place/Name/ first
      const m = url.match(/\/maps\/place\/([^/@?#]+)/);
      let quickName = m && !m[1].startsWith('data')
        ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
      // Fall back to ?q=Name,+Address — stop before street number
      if (!quickName) {
        const qm = url.match(/[?&]q=([^&]+)/);
        if (qm) {
          const parts = decodeURIComponent(qm[1].replace(/\+/g, ' ')).split(',').map(s => s.trim());
          const addrIdx = parts.findIndex(p => /^\d/.test(p));
          quickName = (addrIdx > 0 ? parts.slice(0, addrIdx) : parts.slice(0, 1)).join(', ');
        }
      }
      if (quickName) {
        document.getElementById('f-title').value = quickName;
        document.getElementById('f-title').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      scheduleLookup(0);
    }, 50);
  }

  function openAdd() {
    clearTimeout(lookupTimer);
    editingId = null;
    document.getElementById('btn-get-missing').style.display = 'none';
    ['f-title','f-city','f-state','f-country','f-cuisine','f-tags','f-note','f-url','f-lat','f-lng','f-lookup-url'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-type').value = '';
    document.getElementById('f-visited').checked = false;
    document.getElementById('lookup-status').textContent = '';
    document.getElementById('lookup-status').style.color = '#6b6560';
    document.getElementById('lookup-spinner').style.display = 'none';
    document.getElementById('modal-title').textContent = 'Add Place';
    document.getElementById('lookup-section').style.display = '';
    document.getElementById('modal').classList.add('open');
    document.getElementById('f-lookup-url').focus();
  }

  function openEdit(id) {
    const r = restaurants.find(x => x.id === id);
    if (!r) return;
    editingId = id;
    document.getElementById('f-title').value   = r.title   ?? '';
    document.getElementById('f-city').value    = r.city    ?? '';
    document.getElementById('f-state').value   = r.state   ?? '';
    document.getElementById('f-country').value = r.country ?? '';
    document.getElementById('f-cuisine').value = r.cuisine ?? '';
    document.getElementById('f-tags').value    = r.tags    ?? '';
    document.getElementById('f-note').value    = r.note    ?? '';
    document.getElementById('f-url').value     = r.url     ?? '';
    document.getElementById('f-lat').value     = r.lat     ?? '';
    document.getElementById('f-lng').value     = r.lng     ?? '';
    document.getElementById('f-visited').checked = !!r.visited;
    document.getElementById('f-type').value = r.type ?? '';
    document.getElementById('modal-title').textContent = 'Edit Place';
    document.getElementById('btn-get-missing').style.display = '';
    document.getElementById('lookup-section').style.display = '';
    document.getElementById('modal').classList.add('open');
    document.getElementById('f-title').focus();
    refreshClearButtons();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  async function lookup() {
    const url = document.getElementById('f-lookup-url').value.trim();
    if (!url) return;
    const statusEl = document.getElementById('lookup-status');
    const spinner = document.getElementById('lookup-spinner');
    statusEl.textContent = '';
    spinner.style.display = 'block';
    try {
      const res = await fetch('/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (data.error) {
        statusEl.style.color = '#b04030';
        statusEl.textContent = '✗ ' + data.error;
        return;
      }
      if (data.title)   document.getElementById('f-title').value   = data.title;
      if (data.city)    document.getElementById('f-city').value    = data.city;
      if (data.state)   document.getElementById('f-state').value   = normalizeState(data.state);
      if (data.country) document.getElementById('f-country').value = data.country;
      if (data.cuisine) document.getElementById('f-cuisine').value = data.cuisine;
      document.getElementById('f-lookup-url').value = '';
      document.getElementById('f-url').value = data.url ?? url;
      document.getElementById('f-lat').value = data.lat ?? '';
      document.getElementById('f-lng').value = data.lng ?? '';
      statusEl.style.color = data.lat ? '#006f84' : '#b04030';
      statusEl.textContent = data.lat
        ? `✓ ${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}`
        : '⚠ Location not found — enter coordinates manually';
      document.getElementById('f-title').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      refreshClearButtons();
    } catch (e) {
      statusEl.style.color = '#b04030';
      statusEl.textContent = '✗ ' + e.message;
    } finally {
      spinner.style.display = 'none';
    }
  }

  async function getMissingInfo() {
    const lat = document.getElementById('f-lat').value;
    const lng = document.getElementById('f-lng').value;
    if (!lat || !lng) return alert('No coordinates available for this entry.');
    const btn = document.getElementById('btn-get-missing');
    btn.textContent = 'Looking up…';
    btn.disabled = true;
    try {
      const res = await fetch('/api/geocode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat: parseFloat(lat), lng: parseFloat(lng) }),
      });
      const data = await res.json();
      if (data.error) { alert('Error: ' + data.error); return; }
      if (data.city  && !document.getElementById('f-city').value)  { document.getElementById('f-city').value  = data.city; }
      if (data.state && !document.getElementById('f-state').value) { document.getElementById('f-state').value = normalizeState(data.state); }
      if (data.country) document.getElementById('f-country').value = data.country;
      refreshClearButtons();
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      btn.textContent = 'Get missing info';
      btn.disabled = false;
    }
  }

  async function save() {
    const body = {
      title:   document.getElementById('f-title').value,
      city:    document.getElementById('f-city').value,
      state:   document.getElementById('f-state').value,
      country: document.getElementById('f-country').value,
      cuisine: document.getElementById('f-cuisine').value,
      tags:    document.getElementById('f-tags').value,
      note:    document.getElementById('f-note').value,
      url:     document.getElementById('f-url').value,
      lat:     document.getElementById('f-lat').value,
      lng:     document.getElementById('f-lng').value,
      visited: document.getElementById('f-visited').checked,
      type:    document.getElementById('f-type').value,
    };
    const parsed = { ...body, lat: body.lat !== '' ? parseFloat(body.lat) : null, lng: body.lng !== '' ? parseFloat(body.lng) : null, visited: body.visited ? 1 : 0 };

    if (editingId === null) {
      const res = await fetch('/api/restaurants', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      restaurants.push({ ...parsed, id: data.id });
    } else {
      await fetch(`/api/restaurants/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      Object.assign(restaurants.find(x => x.id === editingId), parsed);
    }
    closeModal();
    renderTable();
  }

  async function del(id) {
    const r = restaurants.find(x => x.id === id);
    if (!confirm(`Delete "${r?.title}"?`)) return;
    await fetch(`/api/restaurants/${id}`, { method: 'DELETE' });
    restaurants = restaurants.filter(x => x.id !== id);
    renderTable();
  }

  // Inject clear buttons into all text inputs and textareas
  document.querySelectorAll('input[type=text], input[type=number], input[type=password], textarea').forEach(el => {
    if (el.readOnly) return;
    const wrap = document.createElement('div');
    wrap.className = 'input-wrap';
    el.parentNode.insertBefore(wrap, el);
    wrap.appendChild(el);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'input-clear-btn';
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/><line x1="6.5" y1="6.5" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="13.5" y1="6.5" x2="6.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    btn.setAttribute('tabindex', '-1');
    if (el.tagName === 'TEXTAREA') wrap.style.flexDirection = 'column';
    wrap.appendChild(btn);
    el._refreshClear = () => { btn.style.display = el.value ? 'block' : 'none'; };
    el.addEventListener('input', el._refreshClear);
    btn.addEventListener('click', () => { el.value = ''; el.dispatchEvent(new Event('input')); el.focus(); });
    el._refreshClear();
  });

  function refreshClearButtons() {
    document.querySelectorAll('.input-clear-btn').forEach(btn => {
      const el = btn.previousElementSibling || btn.parentElement.querySelector('input, textarea');
      if (el && el._refreshClear) el._refreshClear();
    });
  }

  // Close modal on backdrop click
  document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  // Close modal on Escape
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  load();
</script>
</body>
</html>
